# Docker Compose for LOCAL DEVELOPMENT — infrastructure services only.
# Backend and frontend run natively (go run / pnpm dev) for fastest iteration.
#
# Usage:
#   docker-compose up -d        # start infra
#   make dev-backend             # in terminal 1
#   make dev-frontend            # in terminal 2

services:
  postgres:
    image: postgres:16-alpine
    container_name: ubothub-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ubothub
      POSTGRES_PASSWORD: ubothub_dev
      POSTGRES_DB: ubothub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ubothub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ubothub-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ubothub_dev --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ubothub_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ubothub-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  asynqmon:
    image: hibiken/asynqmon:latest
    container_name: ubothub-asynqmon
    ports:
      - "8081:8080"
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ubothub_dev
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
